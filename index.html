<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stryde | Run-Walk Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Stryde</h1>
        <p class="subtitle">Interval Trainer</p>
      </header>

      <main>
        <div class="timer-card">
          <div class="status-badge" id="current-mode">Ready</div>
          <div class="timer-display" id="timer">00:00</div>
          <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
          </div>
        </div>

        <div class="settings-grid">
          <div class="setting-item">
            <label>Run Time (min)</label>
            <input type="number" id="run-time" value="5" min="1" max="60">
          </div>
          <div class="setting-item">
            <label>Walk Time (min)</label>
            <input type="number" id="walk-time" value="2" min="1" max="60">
          </div>
        </div>

        <div class="controls">
          <button id="start-btn" class="primary-btn">Start Session</button>
          <button id="stop-btn" class="secondary-btn hidden">Stop</button>
          <button id="reset-btn" class="outline-btn">Reset</button>
        </div>
      </main>

      <footer>
        <p>Silent Vibrating Alerts Enabled</p>
      </footer>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
