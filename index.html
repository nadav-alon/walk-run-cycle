<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Stryde | Pro Interval Trainer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Stryde</h1>
        <p class="subtitle">Peak Performance</p>
      </header>

      <main>
        <div class="timer-container" id="timer-ui">
          <svg class="timer-svg" viewBox="0 0 100 100">
            <circle class="timer-track" cx="50" cy="50" r="45"></circle>
            <circle class="timer-progress" id="progress-circle" cx="50" cy="50" r="45" 
                    stroke-dasharray="282.7" stroke-dashoffset="0"></circle>
          </svg>
          
          <div class="timer-content">
            <div class="status-badge" id="current-mode">Ready</div>
            <div class="timer-display" id="timer">00:00</div>
          </div>
        </div>

        <div class="settings-panel">
          <div class="setting-card">
            <span class="setting-label">Run</span>
            <div class="setting-input-wrapper">
              <input type="number" id="run-min" value="5" min="0" max="60">
              <span class="setting-unit">m</span>
              <input type="number" id="run-sec" value="0" min="0" max="59">
              <span class="setting-unit">s</span>
            </div>
          </div>
          <div class="setting-card">
            <span class="setting-label">Walk</span>
            <div class="setting-input-wrapper">
              <input type="number" id="walk-min" value="2" min="0" max="60">
              <span class="setting-unit">m</span>
              <input type="number" id="walk-sec" value="0" min="0" max="59">
              <span class="setting-unit">s</span>
            </div>
          </div>
          <div class="setting-card">
            <span class="setting-label">Cycle</span>
            <div class="setting-input-wrapper">
              <input type="number" id="cycle-min" value="3" min="0" max="60">
              <span class="setting-unit">m</span>
              <input type="number" id="cycle-sec" value="0" min="0" max="59">
              <span class="setting-unit">s</span>
            </div>
          </div>
        </div>

        <div id="pwa-modal" class="modal hidden">
          <div class="modal-content">
            <h3>Install Stryde</h3>
            <div class="install-steps">
              <p><strong>iOS:</strong> Tap <img src="https://img.icons8.com/ios/50/ffffff/share.png" width="16" style="vertical-align:middle"> then "Add to Home Screen"</p>
              <p><strong>Android/Chrome:</strong> Tap the Menu ⋮ then "Install App"</p>
            </div>
            <button class="btn btn-primary" id="close-modal">Got it</button>
          </div>
        </div>

        <div class="controls-stack">
          <button id="start-btn" class="btn btn-primary">
            <span>Start Training</span>
          </button>
          <button id="stop-btn" class="btn btn-stop hidden">
            <span>Pause</span>
          </button>
          <button id="reset-btn" class="btn btn-outline">
            <span>Reset Session</span>
          </button>
          <button id="pwa-btn" class="btn btn-outline">
            <span>How to Install PWA</span>
          </button>
        </div>
      </main>

      <footer>
        <div class="haptic-check" id="haptic-check">Test Vibrations</div>
        <p id="haptic-status">Audio & Haptics Active</p>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
